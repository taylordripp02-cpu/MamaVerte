<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Le Jardin de Maman</title>
    
    <!-- PWA / Web App Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2A9D8F">
    
    <!-- Apple / iOS Specific Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="MamanVerte">
    <!-- Icone pour l'écran d'accueil iPhone (SVG en data URI simple) -->
    <link rel="apple-touch-icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%232A9D8F" rx="20"/><text y="70" x="10" font-size="70">🌿</text></svg>'>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-decor"></div>
    
    <div class="app-container">
        <header>
            <h1>🌿 Le Jardin de Maman</h1>
            <p>Suivi de tes belles plantations !</p>
        </header>

        <main>
            <section class="form-section glass-panel">
                <h2>Ajouter une plantation</h2>
                <form id="plant-form">
                    <div class="input-group">
                        <label for="plant-name">Légume / Plante</label>
                        <input type="text" id="plant-name" placeholder="ex: Tomates Cerises" required />
                    </div>

                    <div class="input-group">
                        <label for="plant-date">Date de plantation</label>
                        <input type="date" id="plant-date" required />
                    </div>

                    <div class="input-group">
                        <label for="germination-time">Temps de germination</label>
                        <input type="text" id="germination-time" placeholder="ex: 7 à 10 jours" required />
                    </div>

                    <div class="input-group">
                        <label for="plant-quantity">Nombre de plants / pots</label>
                        <input type="number" id="plant-quantity" min="1" placeholder="ex: 4" required />
                    </div>

                    <div class="input-group">
                        <label for="plant-temperature">Température idéale</label>
                        <input type="text" id="plant-temperature" placeholder="ex: 20°C" required />
                    </div>

                    <div class="input-group">
                        <label for="plant-distance">Distance entre les plants</label>
                        <input type="text" id="plant-distance" placeholder="ex: 30 cm" required />
                    </div>

                    <div class="input-group">
                        <label for="harvest-period">Période de récolte</label>
                        <input type="text" id="harvest-period" placeholder="ex: Juillet - Août" required />
                    </div>


                    <button type="submit" class="btn-submit">Planter ! 🌱</button>
                </form>
            </section>

            <div class="main-content-area" style="display: flex; flex-direction: column; gap: 3rem; min-width: 0;">
                <section class="calendar-section glass-panel">
                    <div class="calendar-header">
                        <h2>📅 Calendrier des Plantations</h2>
                        <div class="calendar-nav">
                            <button type="button" id="prev-month" class="btn-icon">&lt;</button>
                            <span id="current-month-year"></span>
                            <button type="button" id="next-month" class="btn-icon">&gt;</button>
                        </div>
                    </div>
                    <div class="calendar">
                        <div class="calendar-weekdays">
                            <div>Lun</div><div>Mar</div><div>Mer</div><div>Jeu</div><div>Ven</div><div>Sam</div><div>Dim</div>
                        </div>
                        <div id="calendar-days" class="calendar-days"></div>
                    </div>
                </section>

                <section class="dashboard-section">
                    <h2>Mes Récoltes En Cours</h2>
                    <div id="plants-grid" class="plants-grid">
                        <!-- Cards will be dynamically injected here by brain.js -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Day View Modal -->
    <div id="day-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2 id="modal-date-title">Date</h2>
                <button class="btn-close" id="close-modal">&times;</button>
            </div>
            <div id="modal-events-list" class="modal-events-list">
                <!-- Events will be injected here -->
            </div>
        </div>
    </div>

    <!-- Main JS script -->
    <script src="brain.js"></script>
</body>
</html>
